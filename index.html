<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#15140F">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PumpPal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  html, body { background:#15140F; margin:0; padding:0; }
  #splashScreen{position:fixed; inset:0; background:#15140F; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:99999; transition:opacity .4s ease;}
  #splashScreen.hide{opacity:0; pointer-events:none;}
  #splashScreen .splash-logo{width:120px; height:120px; margin-bottom:12px; object-fit:contain;}
  #splashScreen .splash-title{font-family:'Oswald',sans-serif; font-weight:700; font-size:30px; letter-spacing:.05em; text-transform:uppercase; color:#EFEAE0;}
  #splashScreen .splash-title span{color:#8A9A5B;}
  #splashScreen .splash-sub{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#9A968A; margin-top:10px;}
  #splashScreen .splash-dots{display:flex; gap:6px; margin-top:14px;}
  #splashScreen .splash-dot{width:6px; height:6px; border-radius:50%; background:#8A9A5B; opacity:.3; animation:splashPulse 1.2s infinite ease-in-out;}
  #splashScreen .splash-dot:nth-child(2){animation-delay:.2s;}
  #splashScreen .splash-dot:nth-child(3){animation-delay:.4s;}
  @keyframes splashPulse{ 0%,100%{opacity:.3; transform:scale(1);} 50%{opacity:1; transform:scale(1.3);} }
</style>
</head>
<body>

<div id="splashScreen">
  <img class="splash-logo" src="icons/mascot/flexing.png" alt="PumpPal">
  <div class="splash-title">PUMP<span>PAL</span></div>
  <div class="splash-sub">Loading your workouts</div>
  <div class="splash-dots">
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="photo-modal" id="photoModal">
  <button class="photo-modal-close" id="photoModalClose">✕</button>
  <div class="photo-modal-content">
    <div class="photo-modal-label" id="photoModalLabel"></div>
    <div id="photoModalImageWrap"></div>
    <div class="photo-modal-stats" id="photoModalStats"></div>
  </div>
</div>
<input type="file" id="checkinFileInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="dataImportInput" accept="application/json" style="display:none">
<div class="recap-banner" id="recapBanner" style="display:none;">
  <div class="recap-banner-mascot" id="recapBannerMascot"></div>
  <div class="recap-banner-text" id="recapBannerText"></div>
  <div class="recap-banner-arrow">›</div>
</div>

<div class="finish-modal" id="recapModal">
  <div class="finish-modal-content recap-modal-content">
    <button class="photo-modal-close" id="recapModalClose">✕</button>
    <div id="recapModalBody"></div>
  </div>
</div>

<div class="finish-modal" id="exerciseImageModal">
  <div class="finish-modal-content exercise-image-modal-content">
    <button class="photo-modal-close" id="exerciseImageModalClose">✕</button>
    <img id="exerciseImageModalImg" src="" alt="" class="exercise-image-modal-img">
    <div id="exerciseImageModalLabel" class="exercise-image-modal-label"></div>
    <div id="exerciseImageModalBody"></div>
  </div>
</div>

<div class="rest-bar" id="restBar">
  <div class="rest-info">
    <span class="rest-label-text" id="restLabel">Rest</span>
    <span class="rest-time-text" id="restTime">0:30</span>
  </div>
  <button class="rest-skip" id="restSkip">Skip</button>
</div>

<div class="finish-modal" id="finishModal">
  <div class="finish-modal-content">
    <button class="photo-modal-close" id="finishModalClose">✕</button>
    <div class="finish-title">Workout complete 💪</div>
    <div id="finishModalBody"></div>
    <button class="primary" id="finishSaveBtn" style="margin-top:14px;">Save workout</button>
  </div>
</div>

<div class="finish-modal" id="overloadModal">
  <div class="finish-modal-content" style="text-align:center;">
    <button class="photo-modal-close" id="overloadModalClose">✕</button>
    <div class="finish-title">Nice consistency! 💪</div>
    <div id="overloadModalBody" class="profile-hint" style="margin-top:0;"></div>
    <div style="display:flex; gap:8px; margin-top:16px;">
      <button type="button" class="checkin-btn" id="overloadNotNowBtn" style="flex:1;">Not now</button>
      <button type="button" class="primary" id="overloadIncreaseBtn" style="flex:1;">Increase weight</button>
    </div>
  </div>
</div>

<div class="finish-modal" id="profileModal">
  <div class="finish-modal-content profile-modal-content">
    <button class="photo-modal-close" id="profileModalClose">✕</button>
    <div id="profileModalBody"></div>
  </div>
</div>

<header>
  <div class="header-top">
    <button class="profile-btn" id="profileBtn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="var(--moss)" stroke-width="2"/><path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7" stroke="var(--moss)" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="eyebrow" id="todayLabel">—</div>
  </div>
  <h1>PUMP<span>PAL</span></h1>
  <div class="stats">
    <div class="stat"><div class="num" id="statSets">0</div><div class="lbl">Sets today</div></div>
    <div class="stat"><div class="num" id="statVolume">0</div><div class="lbl" id="statVolumeLabel">Volume (kg)</div></div>
    <div class="stat"><div class="num" id="statStreak">0</div><div class="lbl">Day streak</div></div>
  </div>
  <div class="workout-bar" id="workoutBar">
    <span class="workout-timer-text">⏱ <span id="workoutTimerText">0:00</span></span>
    <button class="finish-workout-btn" id="finishWorkoutBtn">Finish Workout</button>
  </div>
</header>

<main>
  <div class="section-title">Progression</div>
  <div id="progCard" class="prog-card"></div>

  <div class="section-title">Workouts</div>
  <button class="repeat-btn" id="repeatWorkoutBtn" style="display:none;">↻ Repeat previous workout</button>
  <div class="plan-grid" id="planGrid"></div>
  <div class="new-workout-form" id="newWorkoutForm">
    <input type="text" id="newWorkoutName" placeholder="Workout name (e.g. Push Day)" autocomplete="off">
    <button id="newWorkoutCreateBtn">Create</button>
  </div>

  <div id="planSection"></div>

  <div class="section-title" id="extrasTitle" style="margin-top:22px; display:none;">Today</div>
  <div id="todayList"></div>
</main>

<datalist id="exerciseOptions"></datalist>

<script src="script.js?v=2"></script>
<script>
  setTimeout(function(){
    var splash = document.getElementById('splashScreen');
    if(splash && !splash.classList.contains('hide')){
      splash.classList.add('hide');
      setTimeout(function(){ splash.remove(); }, 500);
    }
  }, 6000);
</script>
</body>
</html>
