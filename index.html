<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rep Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15140F;
    --surface:#1F1E17;
    --surface-2:#29281F;
    --text:#EFEAE0;
    --text-dim:#9A968A;
    --moss:#8A9A5B;
    --moss-dim:#5f6a40;
    --rust:#B0562E;
    --amber:#D8A24A;
    --border:#35331F;
    --skin:#E3B08C;
    --hair:#2E2115;
    --leggings:#39422F;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; min-height:100vh; padding-bottom:32px;}
  ::selection{background:var(--moss); color:var(--bg);}

  header{padding:28px 20px 16px; border-bottom:1px solid var(--border);}
  .eyebrow{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-dim);}
  h1{font-family:'Oswald',sans-serif; font-weight:700; font-size:34px; letter-spacing:.02em; text-transform:uppercase; margin:4px 0 0; color:var(--text);}
  h1 span{color:var(--moss);}

  .stats{display:flex; gap:1px; background:var(--border); border:1px solid var(--border); margin:16px 20px 0; border-radius:10px; overflow:hidden;}
  .stat{flex:1; background:var(--surface); padding:12px 10px; text-align:center;}
  .stat .num{font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; color:var(--amber);}
  .stat .lbl{font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-dim); margin-top:2px;}

  main{padding:24px 20px 0;}
  .section-title{font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-dim); margin:0 0 10px; display:flex; justify-content:space-between; align-items:center;}
  .empty{border:1px dashed var(--border); border-radius:12px; padding:24px 16px; text-align:center; color:var(--text-dim); font-size:14px; line-height:1.5;}

  /* Workout timer bar */
  .workout-bar{display:none; align-items:center; justify-content:space-between; margin:14px 20px 0; background:var(--surface); border:1px solid var(--moss); border-radius:10px; padding:10px 14px;}
  .workout-timer-text{font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:700; color:var(--amber);}
  .finish-workout-btn{background:var(--moss); color:var(--bg); border:none; border-radius:8px; padding:8px 14px; font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.03em; cursor:pointer;}

  /* Repeat previous workout */
  .repeat-btn{width:100%; background:var(--surface-2); border:1px dashed var(--moss); color:var(--moss); border-radius:10px; padding:10px; font-size:13px; font-weight:600; cursor:pointer; margin-bottom:10px;}

  /* Finish workout modal */
  .finish-modal{position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:110; padding:24px;}
  .finish-modal.open{display:flex;}
  .finish-modal-content{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px 20px; max-width:340px; width:100%; position:relative;}
  .finish-title{font-family:'Oswald',sans-serif; font-size:20px; font-weight:700; text-transform:uppercase; text-align:center; margin-bottom:16px;}
  .finish-stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:14px;}
  .finish-stat{background:var(--surface-2); padding:12px; text-align:center;}
  .finish-stat-num{font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; color:var(--amber);}
  .finish-stat-lbl{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); margin-top:2px;}
  .finish-pr-title{font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--amber); margin-bottom:8px; font-weight:600;}
  .finish-pr-item{font-size:13px; padding:6px 0; border-top:1px solid var(--border);}

  /* icons */
  .ex-icon-wrap{width:54px; height:54px; border-radius:10px; background:var(--surface-2); border:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .ex-icon-wrap svg{width:44px; height:44px;}

  /* Plan picker */
  .plan-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:8px;}
  .new-workout-form{display:none; gap:8px; margin-bottom:14px;}
  .new-workout-form input{flex:1;}
  .new-workout-form button{background:var(--moss); color:var(--bg); border:none; border-radius:8px; padding:0 16px; font-weight:600; font-size:13px; cursor:pointer; flex-shrink:0;}
  .plan-btn{background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:12px 10px; font-family:'Oswald',sans-serif; font-size:13px; font-weight:600; letter-spacing:.02em; text-transform:uppercase; text-align:left; cursor:pointer;}
  .plan-btn.full-width{grid-column:1 / -1;}
  .plan-btn.active{background:rgba(138,154,91,0.16); border-color:var(--moss); color:var(--moss);}

  /* Progression card */
  .prog-card{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:26px;}
  .prog-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .prog-week{font-family:'Oswald',sans-serif; font-size:18px; font-weight:600; text-transform:uppercase;}
  .prog-phase{color:var(--amber); font-family:'JetBrains Mono',monospace; font-size:12px; margin-top:2px;}
  .prog-desc{font-size:13px; color:var(--text-dim); margin-top:8px; line-height:1.5;}
  .prog-dots{display:flex; gap:6px; margin-top:12px;}
  .prog-dot{flex:1; height:6px; border-radius:3px; background:var(--border);}
  .prog-dot.filled{background:var(--moss);}
  .prog-edit{background:none; border:none; color:var(--text-dim); font-size:12px; text-decoration:underline; cursor:pointer; padding:0;}
  .prog-start-form{display:flex; gap:8px; margin-top:10px;}
  .prog-start-form input{flex:1;}
  .prog-start-form button{background:var(--moss); color:var(--bg); border:none; border-radius:8px; padding:0 14px; font-weight:600; font-size:13px; cursor:pointer;}

  /* Check-in */
  .checkin-section{margin-top:16px; padding-top:14px; border-top:1px solid var(--border);}
  .checkin-title{font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-dim); margin-bottom:8px;}
  .checkin-row{display:flex; align-items:center; gap:12px;}
  .checkin-thumb{width:56px; height:56px; border-radius:10px; object-fit:cover; border:1px solid var(--border); cursor:pointer;}
  .checkin-placeholder{width:56px; height:56px; border-radius:10px; border:1px dashed var(--border); display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:22px; flex-shrink:0;}
  .checkin-btn{background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:10px 14px; font-size:13px; font-weight:600; cursor:pointer;}
  .photo-strip{display:flex; gap:8px; margin-top:12px; overflow-x:auto; padding-bottom:4px;}
  .photo-strip-item{flex-shrink:0; text-align:center;}
  .photo-strip-item img, .photo-strip-item .ph-empty{width:48px; height:48px; border-radius:8px; object-fit:cover; border:1px solid var(--border); cursor:pointer;}
  .photo-strip-item .ph-empty{display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:11px; border-style:dashed;}
  .photo-strip-item .ph-label{font-size:10px; color:var(--text-dim); margin-top:4px; font-family:'JetBrains Mono',monospace;}
  .photo-strip-add{width:48px; height:48px; border-radius:8px; border:1px dashed var(--moss); background:none; color:var(--moss); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .photo-modal{position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:100; padding:24px;}
  .photo-modal.open{display:flex;}
  .photo-modal-content{display:flex; flex-direction:column; align-items:center; gap:14px; max-width:100%;}
  .photo-modal img{max-width:100%; max-height:70vh; border-radius:12px; display:block;}
  .photo-modal-noimg{width:220px; height:220px; max-width:70vw; max-height:40vh; border-radius:12px; border:1px dashed var(--text-dim); display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:13px; text-align:center; padding:16px;}
  .photo-modal-label{font-family:'Oswald',sans-serif; font-size:18px; font-weight:600; text-transform:uppercase; color:var(--text); letter-spacing:.02em;}
  .photo-modal-stats{display:flex; flex-direction:column; align-items:center; gap:10px; width:260px; max-width:80vw;}
  .photo-modal-stats .checkin-metrics{width:100%;}
  .photo-modal-close{position:absolute; top:20px; right:20px; background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:50%; width:36px; height:36px; font-size:16px; cursor:pointer;}

  /* Plan group / exercise cards */
  .plan-group{margin-bottom:18px;}
  .plan-group-header{margin-bottom:8px;}
  .plan-group-header-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .plan-group-title{font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; text-transform:uppercase; letter-spacing:.02em;}
  .plan-group-focus{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .group-edit-btn{background:none; border:none; color:var(--text-dim); font-size:12px; text-decoration:underline; cursor:pointer; padding:2px 0; flex-shrink:0;}
  .group-edit-btn-delete{color:var(--rust); font-weight:600;}

  /* Template editor */
  .template-editor{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:10px;}
  .template-row{display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap;}
  .template-row input{background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:9px; font-size:13px; width:100%;}
  .template-row .t-name{flex:1.6; min-width:110px;}
  .template-row .t-target{flex:1.1; min-width:80px;}
  .template-row .t-weight{flex:0.7; min-width:56px;}
  .template-row .t-remove{background:none; border:none; color:var(--rust); font-size:16px; cursor:pointer; padding:0 6px; flex-shrink:0;}
  .template-add-row{border-top:1px dashed var(--border); padding-top:10px; margin-top:2px;}
  .template-add-row .t-add{background:var(--moss); color:var(--bg); border:none; border-radius:8px; padding:0 14px; font-weight:600; font-size:13px; cursor:pointer; flex-shrink:0;}
  .template-actions{display:flex; gap:8px; margin-top:6px;}
  .template-actions button{flex:1; border-radius:8px; padding:10px; font-weight:600; font-size:13px; cursor:pointer; border:none; font-family:'Oswald',sans-serif; text-transform:uppercase;}
  .template-save{background:var(--moss); color:var(--bg);}
  .template-cancel{background:var(--surface-2); color:var(--text-dim);}

  /* Rep tap panel */
  .rep-tap-panel{padding-top:2px;}
  .rep-tap-setlabel{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px;}
  .rep-tap-panel .qa-weight{margin-bottom:10px;}
  .rep-tap-btn{width:100%; background:var(--moss); border:none; border-radius:12px; padding:18px; cursor:pointer; color:var(--bg); text-align:center;}
  .rep-tap-btn:active{background:var(--moss-dim);}
  .rep-tap-btn:disabled{opacity:0.6;}
  .rep-tap-count{font-family:'Oswald',sans-serif; font-size:17px; font-weight:600; text-transform:uppercase; letter-spacing:.02em;}
  .rep-tap-slash{display:none;}
  .rep-tap-hint{font-size:11px; text-transform:uppercase; letter-spacing:.06em; margin-top:2px; font-weight:600;}

  .checklist-item{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; margin-bottom:8px; cursor:pointer;}
  .checklist-item.done{border-color:var(--moss); background:rgba(138,154,91,0.1);}
  .checkbox{width:20px; height:20px; border-radius:6px; border:2px solid var(--text-dim); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .checklist-item.done .checkbox{background:var(--moss); border-color:var(--moss);}
  .checkbox svg{display:none; width:12px; height:12px;}
  .checklist-item.done .checkbox svg{display:block;}
  .checklist-label{font-size:14px; flex:1;}
  .checklist-item.done .checklist-label{color:var(--text-dim); text-decoration:line-through;}

  .exercise-card{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:10px;}
  .exercise-row{display:flex; gap:12px; align-items:center; cursor:pointer;}
  .exercise-info{flex:1; min-width:0;}
  .exercise-name{font-weight:600; font-size:15px;}
  .exercise-target{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--amber); margin-top:2px;}
  .exercise-note{font-size:11px; color:var(--text-dim); margin-top:1px;}
  .tally{display:flex; align-items:center; gap:6px; margin-top:6px;}
  .tally svg{display:block;}
  .tally-count{font-family:'JetBrains Mono',monospace; color:var(--text-dim); font-size:12px;}
  .exercise-meta{text-align:right; font-family:'JetBrains Mono',monospace; color:var(--text-dim); font-size:12px; flex-shrink:0;}
  .exercise-side{display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0;}
  .exercise-complete-btn{background:none; border:1px solid var(--moss); color:var(--moss); font-size:11px; font-weight:600; padding:4px 9px; border-radius:6px; cursor:pointer; white-space:nowrap;}
  .exercise-complete-btn.done{background:var(--moss); color:var(--bg); border-color:var(--moss);}
  .exercise-card.completed{opacity:0.55;}

  .quick-add{display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--border);}
  .quick-add.open{display:block;}
  .quick-add-row{display:flex; gap:8px;}
  .quick-add-row input{background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:10px; font-family:'JetBrains Mono',monospace; font-size:14px; width:100%;}
  .quick-add-row button{background:var(--moss); color:var(--bg); border:none; border-radius:8px; padding:0 16px; font-family:'Oswald',sans-serif; font-weight:600; font-size:13px; text-transform:uppercase; cursor:pointer; flex-shrink:0;}
  .set-item{display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-family:'JetBrains Mono',monospace; font-size:13px; gap:8px;}
  .set-item .val{color:var(--text);}
  .set-actions{display:flex; gap:4px; flex-shrink:0;}
  .del-btn{background:none; border:none; color:var(--rust); font-size:12px; font-family:'Inter',sans-serif; padding:4px 6px; cursor:pointer;}
  .edit-btn{background:none; border:none; color:var(--moss); font-size:12px; font-family:'Inter',sans-serif; padding:4px 6px; cursor:pointer;}
  .set-item input{padding:6px 8px; font-size:13px; width:64px;}
  .set-item .edit-save, .set-item .edit-cancel{background:var(--moss); color:var(--bg); border:none; border-radius:6px; padding:6px 10px; font-size:12px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif;}
  .set-item .edit-cancel{background:var(--surface-2); color:var(--text-dim);}
  .exercise-prev{font-size:11px; color:var(--text-dim); margin-top:4px; font-family:'JetBrains Mono',monospace;}
  .exercise-prev b{color:var(--amber); font-weight:600;}

  /* Rest timer */
  .rest-bar{position:fixed; left:16px; right:16px; bottom:20px; background:var(--moss); color:var(--bg); border-radius:12px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 6px 18px rgba(0,0,0,0.35); transform:translateY(20px); opacity:0; pointer-events:none; transition:transform .2s ease, opacity .2s ease; z-index:40;}
  .rest-bar.show{transform:translateY(0); opacity:1; pointer-events:auto;}
  .rest-info{display:flex; flex-direction:column;}
  .rest-info .rest-label-text{font-size:11px; text-transform:uppercase; letter-spacing:.06em; font-weight:600;}
  .rest-info .rest-time-text{font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700;}
  .rest-skip{background:rgba(21,20,15,0.2); border:none; color:var(--bg); border-radius:8px; padding:8px 14px; font-weight:600; font-size:12px; cursor:pointer;}

  /* Check-in metrics */
  .checkin-metrics{display:flex; gap:8px; margin-top:10px;}
  .checkin-metrics input{font-family:'JetBrains Mono',monospace; font-size:14px;}
  .checkin-metrics button{background:var(--moss); color:var(--bg); border:none; border-radius:8px; padding:0 14px; font-weight:600; font-size:13px; cursor:pointer; flex-shrink:0;}
  .checkin-saved-metrics{display:flex; gap:14px; margin-top:8px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim);}
  .checkin-saved-metrics b{color:var(--amber);}

  .history-item{display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:8px;}
  .history-date{font-weight:600; font-size:14px;}
  .history-sub{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .history-vol{font-family:'JetBrains Mono',monospace; color:var(--amber); font-size:14px;}

  input, .exercise-input{background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:12px; font-family:'Inter',sans-serif; font-size:15px; width:100%;}
  input:focus{outline:2px solid var(--moss); outline-offset:-1px;}
  input[type=number]{font-family:'JetBrains Mono',monospace;}
  button.primary{background:var(--moss); color:var(--bg); border:none; border-radius:8px; padding:14px; font-family:'Oswald',sans-serif; font-weight:600; font-size:15px; letter-spacing:.04em; text-transform:uppercase; cursor:pointer; width:100%;}
  button.primary:active{background:var(--moss-dim);}

  .toast{position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-60px); background:var(--moss); color:var(--bg); padding:10px 18px; border-radius:20px; font-size:13px; font-weight:600; transition:transform .25s ease; z-index:50;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion: reduce){ .quick-add, .toast{transition:none;} }
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="photo-modal" id="photoModal">
  <button class="photo-modal-close" id="photoModalClose">✕</button>
  <div class="photo-modal-content">
    <div class="photo-modal-label" id="photoModalLabel"></div>
    <div id="photoModalImageWrap"></div>
    <div class="photo-modal-stats" id="photoModalStats"></div>
  </div>
</div>
<input type="file" id="checkinFileInput" accept="image/*" capture="environment" style="display:none">
<div class="rest-bar" id="restBar">
  <div class="rest-info">
    <span class="rest-label-text" id="restLabel">Rest</span>
    <span class="rest-time-text" id="restTime">0:30</span>
  </div>
  <button class="rest-skip" id="restSkip">Skip</button>
</div>

<div class="finish-modal" id="finishModal">
  <div class="finish-modal-content">
    <button class="photo-modal-close" id="finishModalClose">✕</button>
    <div class="finish-title">Workout complete 💪</div>
    <div id="finishModalBody"></div>
    <button class="primary" id="finishSaveBtn" style="margin-top:14px;">Save workout</button>
  </div>
</div>

<header>
  <div class="eyebrow" id="todayLabel">—</div>
  <h1>REP <span>LOG</span></h1>
  <div class="stats">
    <div class="stat"><div class="num" id="statSets">0</div><div class="lbl">Sets today</div></div>
    <div class="stat"><div class="num" id="statVolume">0</div><div class="lbl">Volume (kg)</div></div>
    <div class="stat"><div class="num" id="statStreak">0</div><div class="lbl">Day streak</div></div>
  </div>
  <div class="workout-bar" id="workoutBar">
    <span class="workout-timer-text">⏱ <span id="workoutTimerText">0:00</span></span>
    <button class="finish-workout-btn" id="finishWorkoutBtn">Finish Workout</button>
  </div>
</header>

<main>
  <div class="section-title">Progression</div>
  <div id="progCard" class="prog-card"></div>

  <div class="section-title">Workouts</div>
  <button class="repeat-btn" id="repeatWorkoutBtn" style="display:none;">↻ Repeat previous workout</button>
  <div class="plan-grid" id="planGrid"></div>
  <div class="new-workout-form" id="newWorkoutForm">
    <input type="text" id="newWorkoutName" placeholder="Workout name (e.g. Push Day)" autocomplete="off">
    <button id="newWorkoutCreateBtn">Create</button>
  </div>

  <div id="planSection"></div>

  <div class="section-title" id="extrasTitle" style="margin-top:22px; display:none;">Today</div>
  <div id="todayList"></div>

  <div class="section-title" style="margin-top:28px;">History</div>
  <div id="historyList"><div class="empty">Past sessions will show up here.</div></div>
</main>

<datalist id="exerciseOptions"></datalist>

<script>
const $ = (id) => document.getElementById(id);
/* ---------- Local Storage Compatibility Layer ---------- */

window.storage = {
  async get(key) {
    const value = localStorage.getItem(key);
    if (value === null) return null;
    return { value };
  },

  async set(key, value) {
    localStorage.setItem(key, value);
    return true;
  },

  async remove(key) {
    localStorage.removeItem(key);
    return true;
  },

function tallySVG(count){
  const groups = Math.ceil(count/5) || 0;
  let svgGroups = "";
  let remaining = count;
  for(let g=0; g<groups; g++){
    const inGroup = Math.min(5, remaining);
    remaining -= inGroup;
    let marks = "";
    const strokeW = 2.5;
    for(let i=0;i<Math.min(inGroup,4);i++){
      const x = 3 + i*4;
      marks += `<line x1="${x}" y1="2" x2="${x}" y2="16" stroke="var(--moss)" stroke-width="${strokeW}" stroke-linecap="round"/>`;
    }
    if(inGroup === 5){
      marks += `<line x1="1" y1="15" x2="16" y2="3" stroke="var(--amber)" stroke-width="${strokeW}" stroke-linecap="round"/>`;
    }
    svgGroups += `<svg width="18" height="18" viewBox="0 0 18 18">${marks}</svg>`;
  }
  return svgGroups;
}

  return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;

function prKey(exercise){
  const safe = String(exercise).trim().toLowerCase().replace(/\s+/g,'-').replace(/['"/\\]/g,'');
  return `pr:${safe}`;
}
async function getPRRecord(exercise){
  try{
    const res = await window.storage.get(prKey(exercise));
    if(res && res.value) return JSON.parse(res.value);
  }catch(e){ /* fall through */ }
  return { maxWeight:0, maxWeightReps:0, best1RM:0, best1RMWeight:0, best1RMReps:0, repsAtWeight:{} };
}
async function checkAndUpdatePR(exercise, weight, reps){
  const record = await getPRRecord(exercise);
  const events = [];
  if(weight > record.maxWeight){
    record.maxWeight = weight; record.maxWeightReps = reps;
    events.push({ type:'weight', detail:`Heaviest weight — ${weight}kg × ${reps}` });
  }
  const wKey = String(weight);
  if(reps > (record.repsAtWeight[wKey] || 0)){
    record.repsAtWeight[wKey] = reps;
    events.push({ type:'reps', detail:`Most reps at ${weight}kg — ${reps} reps` });
  }
  if(weight > 0){
    const est1RM = weight * (1 + reps/30);
    if(est1RM > record.best1RM){
      record.best1RM = est1RM; record.best1RMWeight = weight; record.best1RMReps = reps;
      events.push({ type:'1rm', detail:`Estimated 1-rep max — ~${Math.round(est1RM)}kg` });
    }
  }
  if(events.length){
    try{ await window.storage.set(prKey(exercise), JSON.stringify(record)); }
    catch(e){ console.error("Could not save PR", e); }
  }
  return events;
}

/* ---------- image compression for check-in photos ---------- */
function compressImageFile(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Could not load image"));
      img.onload = () => {
        let { width, height } = img;
        const maxDim = 900;
        if(width > maxDim || height > maxDim){
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        let quality = 0.72;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        while(dataUrl.length > 3500000 && quality > 0.3){
          quality -= 0.12;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        resolve(dataUrl);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---------- progression ---------- */
function getPhase(week){
  if(week<=2) return {label:'Learn the form', desc:'Focus on clean technique and full range of motion. Keep weight light — this block is about the movement, not the load.'};
  if(week<=4) return {label:'Increase reps', desc:'Form should feel steady now. Add a few reps per set before adding any weight.'};
  if(week<=6) return {label:'Increase weight / resistance', desc:'Reps feel manageable — this is the block to add weight or resistance.'};
  return {label:'Keep progressing', desc:'You are past the first 6-week cycle. Keep nudging weight or resistance up as it feels manageable.'};
}

function currentWeekFromStart(startStr){
  const [y,m,d] = startStr.split("-").map(Number);
  const start = new Date(y, m-1, d);
  const [ty,tm,td] = todayKey.split("-").map(Number);
  const now = new Date(ty, tm-1, td);
  const days = Math.round((now - start) / 86400000);
  return Math.max(1, Math.floor(days/7) + 1);
}

async function weekForDate(dateStr){
  const startStr = await getProgramStart();
  if(!startStr) return null;
  const [sy,sm,sd] = startStr.split("-").map(Number);
  const start = new Date(sy, sm-1, sd);
  const [dy,dm,dd] = dateStr.split("-").map(Number);
  const d = new Date(dy, dm-1, dd);
  const days = Math.round((d - start) / 86400000);
  if(days < 0) return null;
  return Math.max(1, Math.floor(days/7) + 1);
}

async function getPreviousPerformance(exerciseName){
  const keys = await getAllSessionKeys();
  const dateKeys = keys.map(k=>k.replace('session:','')).filter(k=>k !== todayKey).sort((a,b)=> b.localeCompare(a));
  for(const key of dateKeys){
    const s = await getSession(key);
    const matches = s.sets.filter(x=>x.exercise === exerciseName);
    if(matches.length > 0){
      const best = matches.reduce((a,b)=> (a.weight*a.reps >= b.weight*b.reps ? a : b));
      const week = await weekForDate(key);
      return { week, date:key, weight:best.weight, reps:best.reps };
    }
  }
  return null;
}

async function getStripTotalWeeks(currentWeek){
  try{
    const res = await window.storage.get('progression-total-weeks');
    const stored = res && res.value ? Number(res.value) : 0;
    return Math.max(currentWeek, 6, stored);
  }catch(e){ return Math.max(currentWeek, 6); }
}
async function addStripWeek(newTotal){
  try{ await window.storage.set('progression-total-weeks', String(newTotal)); }
  catch(e){ console.error("Could not extend weeks", e); }
}
async function renderPhotoStrip(currentWeek){
  const strip = $("photoStrip");
  if(!strip) return;
  const total = await getStripTotalWeeks(currentWeek);
  strip.innerHTML = "";
  for(let w=0; w<=total; w++){
    const data = await getWeekData(w);
    const item = document.createElement('div');
    item.className = 'photo-strip-item';
    const sub = data.weight ? `${data.weight}kg` : '\u00A0';
    const wkLabel = w === 0 ? 'Start' : `Wk ${w}`;
    item.innerHTML = data.photo
      ? `<img src="${data.photo}" alt="Week ${w}"><div class="ph-label">${wkLabel} · ${sub}</div>`
      : `<div class="ph-empty">${wkLabel}</div><div class="ph-label">&nbsp;</div>`;
    item.addEventListener('click', ()=>openPhotoModal(w));
    strip.appendChild(item);
  }
  const addTile = document.createElement('div');
  addTile.className = 'photo-strip-item';
  addTile.innerHTML = `<button class="photo-strip-add" id="addWeekBtn">+</button><div class="ph-label">Add</div>`;
  addTile.querySelector('#addWeekBtn').addEventListener('click', async ()=>{
    await addStripWeek(total + 1);
    await renderPhotoStrip(currentWeek);
  });
  strip.appendChild(addTile);
}

async function quickLog(exercise, weightVal, repsVal, targetSets){
  const reps = Number(repsVal);
  if(!reps){ showToast("Add a rep count"); return; }
  const weight = weightVal ? Number(weightVal) : 0;
  const newSet = { id:`${Date.now()}-${Math.random().toString(36).slice(2,7)}`, exercise, weight, reps, ts: Date.now() };
  const updated = await updateSession(todayKey, (s)=>{
    if(!s.startedAt) s.startedAt = Date.now();
    s.finishedAt = null;
    s.sets.push(newSet);
  });
  await saveExerciseName(exercise);

  const prEvents = await checkAndUpdatePR(exercise, weight, reps);
  if(prEvents.length){
    await updateSession(todayKey, (s)=>{
      s.newPRs = s.newPRs || [];
      prEvents.forEach(ev => s.newPRs.push({ exercise, ...ev, ts: Date.now() }));
    });
    showToast(`🏆 New PR — ${exercise}`);
  } else {
    showToast("Set logged");
  }
  await renderAll();

  const countForExercise = updated.sets.filter(s=>s.exercise === exercise).length;
  if(targetSets && countForExercise % targetSets === 0){
    startRest(60, "Exercise done — rest before next");
  } else {
    startRest(30, "Rest between sets");
  }
}
async function deleteSet(id){
  await updateSession(todayKey, (s)=>{ s.sets = s.sets.filter(x=>x.id !== id); });
  await renderAll();
}
async function editSet(id, weightVal, repsVal){
  const reps = Number(repsVal);
  if(!reps){ showToast("Add a rep count"); return; }
  await updateSession(todayKey, (s)=>{
    const target = s.sets.find(x=>x.id === id);
    if(target){ target.weight = weightVal ? Number(weightVal) : 0; target.reps = reps; }
  });
  showToast("Set updated");
  await renderAll();
}

async function buildExerciseCard(ex, loggedSets, isCompleted){
  const card = document.createElement("div");
  card.className = `exercise-card${isCompleted ? ' completed' : ''}`;
  card.dataset.exercise = ex.name;
  const iconSvg = getIcon(ex.name) || GENERIC_ICON;
  const prev = await getPreviousPerformance(ex.name);
  const prevLabel = prev ? (prev.week ? `Wk ${prev.week}` : prettyDate(prev.date)) : null;
  const targetSetsNum = extractLeadingSets(ex.target);
  const repGoal = parseRepGoal(ex.target);
  const setNumber = targetSetsNum ? Math.min(loggedSets.length + 1, targetSetsNum) : loggedSets.length + 1;
  const lastLogged = loggedSets.length ? loggedSets[loggedSets.length - 1] : null;
  const weightDefault = lastLogged ? lastLogged.weight : (ex.weight != null ? ex.weight : (prev ? prev.weight : ''));

  const bodyHTML = repGoal
    ? `
      <div class="rep-tap-panel">
        <div class="rep-tap-setlabel">Set ${setNumber}${targetSetsNum ? ` of ${targetSetsNum}` : ''} · ${repGoal} reps</div>
        <input type="number" inputmode="decimal" placeholder="Weight kg" class="qa-weight" min="0" step="0.5" value="${weightDefault}">
        <button type="button" class="rep-tap-btn">
          <span class="rep-tap-count">Tap to log set</span>
          <div class="rep-tap-hint">${repGoal} reps at this weight</div>
        </button>
      </div>
      ${loggedSets.map(setItemHTML).join("")}
    `
    : `
      <div class="quick-add-row">
        <input type="number" inputmode="decimal" placeholder="Weight kg" class="qa-weight" min="0" step="0.5" value="${weightDefault}">
        <input type="number" inputmode="numeric" placeholder="Reps" class="qa-reps" min="1" step="1">
        <button class="qa-log">Log</button>
      </div>
      ${loggedSets.map(setItemHTML).join("")}
    `;

  card.innerHTML = `
    <div class="exercise-row" data-toggle>
      <div class="ex-icon-wrap">${iconSvg}</div>
      <div class="exercise-info">
        <div class="exercise-name">${escapeHTML(ex.name)}</div>
        <div class="exercise-target">${escapeHTML(ex.target)}${ex.weight != null ? ` · ${ex.weight}kg` : ''}</div>
        ${ex.note ? `<div class="exercise-note">${escapeHTML(ex.note)}</div>` : ``}
        ${prev ? `<div class="exercise-prev">Previous (${escapeHTML(prevLabel)}): <b>${prev.weight}kg × ${prev.reps}</b></div>` : ``}
        <div class="tally">${tallySVG(loggedSets.length)}<span class="tally-count">${loggedSets.length} logged</span></div>
      </div>
      <div class="exercise-side">
        <div class="exercise-meta">${Math.round(volumeOf(loggedSets))} kg vol</div>
        <button type="button" class="exercise-complete-btn ${isCompleted ? 'done' : ''}" data-complete="${escapeHTML(ex.name)}">${isCompleted ? '✓ Done' : 'Complete'}</button>
      </div>
    </div>
    <div class="quick-add">${bodyHTML}</div>
  `;
  card.querySelector('[data-toggle]').addEventListener('click', ()=>{ card.querySelector('.quick-add').classList.toggle('open'); });
  card.querySelector('.exercise-complete-btn').addEventListener('click', (e)=>{
    e.stopPropagation();
    toggleExerciseComplete(ex.name);
  });

  if(repGoal){
    const tapBtn = card.querySelector('.rep-tap-btn');
    tapBtn.addEventListener('click', async (e)=>{
      e.stopPropagation();
      if(tapBtn.disabled) return;
      tapBtn.disabled = true;
      const weight = card.querySelector('.qa-weight').value;
      await quickLog(ex.name, weight, repGoal, targetSetsNum);
      if(targetSetsNum){
        const freshSession = await getSession(todayKey);
        const countNow = freshSession.sets.filter(s=>s.exercise === ex.name).length;
        if(countNow % targetSetsNum === 0) advanceToNextExercise(ex.name);
      }
    });
  } else {
    card.querySelector('.qa-log').addEventListener('click', (e)=>{
      e.stopPropagation();
      quickLog(ex.name, card.querySelector('.qa-weight').value, card.querySelector('.qa-reps').value, targetSetsNum);
    });
  }
  wireSetItems(card);
  return card;
}

async function toggleExerciseComplete(name){
  const session = await getSession(todayKey);
  const isDone = (session.completed || []).includes(name);
  await updateSession(todayKey, (s)=>{
    s.completed = s.completed || [];
    s.completed = isDone ? s.completed.filter(n=>n!==name) : [...s.completed, name];
  });
  await renderAll();
  if(!isDone) advanceToNextExercise(name);
}

async function renderPlanSection(){
  const session = await getSession(todayKey);
  const container = $("planSection");
  const grouped = groupByExercise(session.sets);
  const customList = await getCustomWorkouts();
  const orderedKeys = [...PLAN_ORDER, ...customList.map(c=>c.key)];
  const activePlans = orderedKeys.filter(k=>session.plan.includes(k));

  if(activePlans.length === 0){
    container.innerHTML = "";
    $("extrasTitle").textContent = "Today";
    return;
  }
  $("extrasTitle").textContent = "Extra sets";
  container.innerHTML = "";

  for(const key of activePlans){
    const w = await getPlanDef(key);
    if(!w) continue;
    const group = document.createElement("div");
    group.className = "plan-group";

    if(w.type === 'checklist'){
      group.innerHTML = `
        <div class="plan-group-header">
          <div class="plan-group-header-top">
            <div class="plan-group-title">${escapeHTML(w.label)}</div>
            <button class="group-edit-btn" data-group-edit="${key}">Delete</button>
          </div>
        </div>
      `;
      const delBtn = group.querySelector('.group-edit-btn');
      delBtn.addEventListener('click', async ()=>{
        if(delBtn.dataset.armed !== '1'){
          delBtn.dataset.armed = '1';
          delBtn.classList.add('group-edit-btn-delete');
          delBtn.textContent = 'Tap again to delete';
          setTimeout(()=>{ if(delBtn.dataset.armed === '1'){ delBtn.dataset.armed = '0'; delBtn.classList.remove('group-edit-btn-delete'); delBtn.textContent = 'Delete'; } }, 3000);
          return;
        }
        await deleteWorkout(key);
      });
      w.exercises.forEach(name=>{
        const done = session.checklist.includes(name);
        const item = document.createElement("div");
        item.className = `checklist-item ${done?'done':''}`;
        const iconSvg = getIcon(name) || GENERIC_ICON;
        item.innerHTML = `
          <div class="ex-icon-wrap">${iconSvg}</div>
          <div class="checklist-label">${escapeHTML(name)}</div>
          <div class="checkbox"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12l5 5L20 6" stroke="#15140F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        `;
        item.addEventListener('click', ()=>toggleChecklistItem(name));
        group.appendChild(item);
      });
    } else if(w.type === 'strength'){
      const exercises = await getWorkoutTemplate(key);
      if(exercises.length === 0) editingGroups.add(key);
      const isEditing = editingGroups.has(key);
      const toggleLabel = isEditing ? 'Delete' : 'Edit';
      group.innerHTML = `
        <div class="plan-group-header">
          <div class="plan-group-header-top">
            <div>
              <div class="plan-group-title">${escapeHTML(w.label)}</div>
              <div class="plan-group-focus">${escapeHTML(w.focus)}</div>
            </div>
            <button class="group-edit-btn ${isEditing ? 'group-edit-btn-delete' : ''}" data-group-edit="${key}">${toggleLabel}</button>
          </div>
        </div>
      `;
      const editBtn = group.querySelector('.group-edit-btn');
      if(editBtn) editBtn.addEventListener('click', async ()=>{
        if(isEditing){
          if(editBtn.dataset.armed !== '1'){
            editBtn.dataset.armed = '1';
            editBtn.textContent = 'Tap again to delete';
            setTimeout(()=>{ if(editBtn.dataset.armed === '1'){ editBtn.dataset.armed = '0'; editBtn.textContent = 'Delete'; } }, 3000);
            return;
          }
          await deleteWorkout(key);
          return;
        }
        if(editingGroups.has(key)) editingGroups.delete(key); else editingGroups.add(key);
        await renderPlanSection();
      });

      if(isEditing){
        group.appendChild(buildTemplateEditor(key, exercises));
      } else {
        for(const ex of exercises){
          const logged = grouped.get(ex.name) || [];
          const isCompleted = (session.completed || []).includes(ex.name);
          const card = await buildExerciseCard(ex, logged, isCompleted);
          group.appendChild(card);
        }
      }
    }
    container.appendChild(group);
  }
}

function buildTemplateEditor(key, exercises){
  const wrap = document.createElement('div');
  wrap.className = 'template-editor';

  const makeRow = (name, target, note, weight)=>{
    const row = document.createElement('div');
    row.className = 'template-row';
    row.innerHTML = `
      <input class="t-name" value="${escapeHTML(name)}" placeholder="Exercise name">
      <input class="t-target" value="${escapeHTML(target)}" placeholder="e.g. 3 × 12">
      <input class="t-weight" type="number" inputmode="decimal" min="0" step="0.5" value="${weight != null ? weight : ''}" placeholder="kg">
      <button class="t-remove" type="button">✕</button>
    `;
    row.querySelector('.t-remove').addEventListener('click', ()=> row.remove());
    return row;
  };

  exercises.forEach(ex=> wrap.appendChild(makeRow(ex.name, ex.target || '', ex.note || '', ex.weight)));

  const addRow = document.createElement('div');
  addRow.className = 'template-row template-add-row';
  addRow.innerHTML = `
    <input class="t-name" placeholder="New exercise name" list="exerciseOptions" autocomplete="off">
    <input class="t-target" placeholder="e.g. 3 × 12">
    <input class="t-weight" type="number" inputmode="decimal" min="0" step="0.5" placeholder="kg">
    <button class="t-add" type="button">Add</button>
  `;
  addRow.querySelector('.t-add').addEventListener('click', ()=>{
    const name = addRow.querySelector('.t-name').value.trim();
    const target = addRow.querySelector('.t-target').value.trim();
    const weight = addRow.querySelector('.t-weight').value;
    if(!name || !target){ showToast("Add a name and target"); return; }
    wrap.insertBefore(makeRow(name, target, '', weight ? Number(weight) : null), addRow);
    addRow.querySelector('.t-name').value = '';
    addRow.querySelector('.t-target').value = '';
    addRow.querySelector('.t-weight').value = '';
  });
  wrap.appendChild(addRow);

  const actions = document.createElement('div');
  actions.className = 'template-actions';
  actions.innerHTML = `
    <button class="template-save" type="button">Save changes</button>
    <button class="template-cancel" type="button">Cancel</button>
  `;
  actions.querySelector('.template-save').addEventListener('click', async ()=>{
    const rows = [...wrap.querySelectorAll('.template-row:not(.template-add-row)')];
    const newExercises = rows.map(r=>{
      const w = r.querySelector('.t-weight').value;
      return {
        name: r.querySelector('.t-name').value.trim(),
        target: r.querySelector('.t-target').value.trim(),
        weight: w ? Number(w) : null
      };
    }).filter(e=>e.name && e.target);
    if(newExercises.length === 0){ showToast("Add at least one exercise"); return; }
    await saveWorkoutTemplate(key, newExercises);
    editingGroups.delete(key);
    showToast("Workout updated");
    await renderPlanSection();
  });
  actions.querySelector('.template-cancel').addEventListener('click', async ()=>{
    editingGroups.delete(key);
    await renderPlanSection();
  });
  wrap.appendChild(actions);
  return wrap;
}

  const grouped = groupByExercise(extraSets);
  container.innerHTML = "";
  grouped.forEach((exSets, name)=>{
    const card = document.createElement("div");
    card.className = "exercise-card";
    const vol = volumeOf(exSets);
    card.innerHTML = `
      <div class="exercise-row" data-toggle>
        <div class="ex-icon-wrap">${GENERIC_ICON}</div>
        <div class="exercise-info">
          <div class="exercise-name">${escapeHTML(name)}</div>
          <div class="tally">${tallySVG(exSets.length)}<span class="tally-count">${exSets.length} set${exSets.length===1?'':'s'}</span></div>
        </div>
        <div class="exercise-meta">${Math.round(vol)} kg vol</div>
      </div>
      <div class="quick-add">
        ${exSets.map(setItemHTML).join("")}
      </div>
    `;
    card.querySelector('[data-toggle]').addEventListener('click', ()=>{ card.querySelector('.quick-add').classList.toggle('open'); });
    wireSetItems(card);
    container.appendChild(card);
  });
}

/* ---------- stats + history ---------- */
async function renderStats(){
  const session = await getSession(todayKey);
  $("statSets").textContent = session.sets.length;
  $("statVolume").textContent = Math.round(volumeOf(session.sets));
}
async function renderHistory(){
  const keys = await getAllSessionKeys();
  const dateKeys = keys.map(k=>k.replace('session:','')).filter(k=>k !== todayKey).sort((a,b)=> b.localeCompare(a));
  const container = $("historyList");
  const todaySession = await getSession(todayKey);

  const allActiveKeys = [];
  for(const key of dateKeys.slice(0,60)){
    const s = await getSession(key);
    if(s.sets.length > 0) allActiveKeys.push({key, sets:s.sets});
  }

  if(allActiveKeys.length === 0){
    container.innerHTML = `<div class="empty">Past sessions will show up here.</div>`;
  } else {
    container.innerHTML = "";
    allActiveKeys.forEach(({key, sets})=>{
      const grouped = groupByExercise(sets);
      const item = document.createElement("div");
      item.className = "history-item";
      item.innerHTML = `
        <div>
          <div class="history-date">${prettyDate(key)}</div>
          <div class="history-sub">${grouped.size} exercise${grouped.size===1?'':'s'} · ${sets.length} sets</div>
        </div>
        <div class="history-vol">${Math.round(volumeOf(sets))} kg</div>
      `;
      container.appendChild(item);
    });
  }

  const allKeys = new Set([todayKey, ...allActiveKeys.map(x=>x.key)]);
  let streak = 0;
  let cursor = new Date(...todayKey.split("-").map((v,i)=> i===1 ? Number(v)-1 : Number(v)));
  while(true){
    const key = dateKey(cursor);
    if(allKeys.has(key)){
      const sets = key === todayKey ? todaySession.sets : (allActiveKeys.find(x=>x.key===key)||{}).sets;
      if(sets && sets.length > 0){ streak++; cursor.setDate(cursor.getDate()-1); continue; }
    }
    break;
  }
  $("statStreak").textContent = streak;
}

/* ---------- workout timer ---------- */
let workoutTimerInterval = null;
let workoutTimerStartedAt = null;
async function updateWorkoutBar(){
  const session = await getSession(todayKey);
  const bar = $("workoutBar");
  if(session.startedAt && !session.finishedAt){
    bar.style.display = 'flex';
    if(workoutTimerStartedAt !== session.startedAt){
      workoutTimerStartedAt = session.startedAt;
      clearInterval(workoutTimerInterval);
      const tick = ()=>{ $("workoutTimerText").textContent = formatDuration(Date.now() - session.startedAt); };
      tick();
      workoutTimerInterval = setInterval(tick, 1000);
    }
  } else {
    bar.style.display = 'none';
    clearInterval(workoutTimerInterval);
    workoutTimerInterval = null;
    workoutTimerStartedAt = null;
  }
}

/* ---------- finish workout ---------- */
async function handleFinishWorkout(){
  const session = await getSession(todayKey);
  if(!session.startedAt){ showToast("Log a set first"); return; }
  const duration = Date.now() - session.startedAt;
  const totalSets = session.sets.length;
  const exerciseNames = new Set(session.sets.map(s=>s.exercise));
  (session.completed || []).forEach(name=>exerciseNames.add(name));
  const uniqueExercises = exerciseNames.size;
  const totalVolume = volumeOf(session.sets);
  const prs = session.newPRs || [];

  $("finishModalBody").innerHTML = `
    <div class="finish-stat-grid">
      <div class="finish-stat"><div class="finish-stat-num">${formatDuration(duration)}</div><div class="finish-stat-lbl">Duration</div></div>
      <div class="finish-stat"><div class="finish-stat-num">${totalSets}</div><div class="finish-stat-lbl">Total sets</div></div>
      <div class="finish-stat"><div class="finish-stat-num">${uniqueExercises}</div><div class="finish-stat-lbl">Exercises</div></div>
      <div class="finish-stat"><div class="finish-stat-num">${Math.round(totalVolume)}</div><div class="finish-stat-lbl">Volume (kg)</div></div>
    </div>
    ${prs.length
      ? `<div class="finish-pr-title">🏆 New personal records</div>${prs.map(p=>`<div class="finish-pr-item">${escapeHTML(p.exercise)}<br>${escapeHTML(p.detail)}</div>`).join("")}`
      : `<div class="finish-pr-title" style="color:var(--text-dim);">No new PRs this time — still solid work.</div>`}
  `;
  $("finishModal").classList.add('open');
}
async function saveFinishedWorkout(){
  await updateSession(todayKey, (s)=>{ s.finishedAt = Date.now(); });
  $("finishModal").classList.remove('open');
  await renderAll();
  showToast("Workout saved 💪");
}

/* ---------- copy previous workout ---------- */
async function findPreviousPlanDay(){
  const keys = await getAllSessionKeys();
  const dateKeys = keys.map(k=>k.replace('session:','')).filter(k=>k !== todayKey).sort((a,b)=> b.localeCompare(a));
  for(const key of dateKeys){
    const s = await getSession(key);
    if(s.plan && s.plan.length) return s.plan;
  }
  return null;
}
async function renderRepeatButton(){
  const session = await getSession(todayKey);
  const btn = $("repeatWorkoutBtn");
  if(session.plan.length){ btn.style.display = 'none'; return; }
  const prevPlan = await findPreviousPlanDay();
  btn.style.display = prevPlan ? 'block' : 'none';
  btn.onclick = async ()=>{
    await updateSession(todayKey, (s)=>{ s.plan = prevPlan; });
    showToast("Loaded previous workout");
    await renderAll();
  };
}

/* ---------- render all ---------- */
async function renderAll(){
  await renderPlanGrid();
  await renderPlanSection();
  await renderExtras();
  await renderStats();
  await renderHistory();
  await renderRepeatButton();
  await updateWorkoutBar();
}

async function init(){
  const now = new Date();
  todayKey = dateKey(now);
  $("todayLabel").textContent = now.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' });

  await loadExerciseNames();
  await renderProgression();
  await renderAll();

  $("photoModalClose").addEventListener('click', closePhotoModal);
  $("photoModal").addEventListener('click', (e)=>{ if(e.target.id === 'photoModal') closePhotoModal(); });
  $("restSkip").addEventListener('click', skipRest);

  $("finishWorkoutBtn").addEventListener('click', handleFinishWorkout);
  $("finishModalClose").addEventListener('click', ()=> $("finishModal").classList.remove('open'));
  $("finishModal").addEventListener('click', (e)=>{ if(e.target.id === 'finishModal') $("finishModal").classList.remove('open'); });
  $("finishSaveBtn").addEventListener('click', saveFinishedWorkout);

  $("newWorkoutCreateBtn").addEventListener('click', createNewWorkout);
  $("newWorkoutName").addEventListener('keydown', (e)=>{ if(e.key === 'Enter') createNewWorkout(); });

  $("checkinFileInput").addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file || currentCheckinWeek === null) return;
    try{
      showToast("Saving photo…");
      const dataUrl = await compressImageFile(file);
      const current = await getWeekData(currentCheckinWeek);
      await saveWeekData(currentCheckinWeek, { photo: dataUrl, weight: current.weight, bodyFat: current.bodyFat });
      await refreshCheckinViews(currentCheckinWeek);
      showToast("Check-in saved");
    }catch(err){
      console.error(err);
      showToast("Couldn't process that photo");
    }
    e.target.value = "";
  });
}

init();
</script>
